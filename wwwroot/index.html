<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourneyFlow | Платформа Турнірів</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
</head>
<body>
    <nav>
        <div class="logo" onclick="showView('tournaments')" style="cursor:pointer;">TourneyFlow</div>
        <div id="auth-ui" style="display:flex; align-items:center; gap:0.75rem;"></div>
    </nav>

    <main id="app">
        <!-- Список турнірів -->
        <div id="view-tournaments" class="animate-fade">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <h1>Турніри</h1>
                <button class="btn admin-only hidden" onclick="showCreateTournament()">+ Створити турнір</button>
            </div>
            <div id="tournament-list" class="grid"><p>Завантаження...</p></div>
        </div>

        <!-- Створення турніру -->
        <div id="view-create-tournament" class="card hidden animate-fade">
            <button class="btn btn-secondary" onclick="showView('tournaments')">← Назад</button>
            <h2 style="margin-top:1rem;">Новий Турнір</h2>
            <form id="form-create-tournament">
                <input type="text" placeholder="Назва турніру" required id="t-name">
                <input type="text" placeholder="Опис та правила" id="t-desc">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;">
                    <div>
                        <label style="display:block; margin-bottom:0.5rem;">Початок реєстрації</label>
                        <div onclick="document.getElementById('t-reg-start').showPicker()" style="cursor:pointer;">
                            <input type="datetime-local" id="t-reg-start" style="pointer-events:none;">
                        </div>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:0.5rem;">Кінець реєстрації</label>
                        <div onclick="document.getElementById('t-reg-end').showPicker()" style="cursor:pointer;">
                            <input type="datetime-local" id="t-reg-end" style="pointer-events:none;">
                        </div>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:0.5rem;">🏆 Дата оголошення результатів</label>
                        <div onclick="document.getElementById('t-results-date').showPicker()" style="cursor:pointer;">
                            <input type="datetime-local" id="t-results-date" style="pointer-events:none;">
                        </div>
                    </div>
                </div>
                <label style="display:block; margin-bottom:0.5rem; margin-top:0.25rem;">👥 Макс. кількість команд (необов'язково)</label>
                <input type="number" id="t-max-teams" min="1" max="200" placeholder="Необмежено" style="width:auto; min-width:200px;">
                <button type="submit" class="btn" style="display:block; margin-top:1rem;">Створити</button>
            </form>
        </div>

        <!-- Деталі турніру -->
        <div id="view-tournament-details" class="hidden animate-fade">
            <button class="btn btn-secondary" onclick="showView('tournaments')">← До списку</button>
            <div class="card" style="margin-top:1rem;">
                <div id="details-content"></div>
                <div id="team-registration" class="hidden"></div>
                <div id="admin-controls" class="admin-only hidden" style="margin-top:2rem; padding-top:2rem; border-top:1px solid var(--glass-border);"></div>
                <div id="team-controls" class="team-only hidden" style="margin-top:2rem; padding-top:2rem; border-top:1px solid var(--glass-border);">
                    <h3>Подача результатів</h3>
                    <div id="active-rounds-for-submission"></div>
                </div>
                <div id="announcements-section" style="margin-top:1.5rem;"></div>
            </div>
        </div>

        <!-- Таблиця лідерів -->
        <div id="view-leaderboard" class="hidden animate-fade">
            <button class="btn btn-secondary" onclick="showView('tournaments')">← Назад</button>
            <h1 id="leaderboard-title" style="margin-top:1rem;">Таблиця лідерів</h1>
            <div class="card">
                <table class="leaderboard-table">
                    <thead><tr><th>Місце</th><th>Команда</th><th>Бал</th></tr></thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </div>

        <!-- Панель журі -->
        <div id="view-jury" class="hidden animate-fade">
            <button class="btn btn-secondary" onclick="showView('tournaments')">← Назад</button>
            <h1 id="jury-title" style="margin-top:1rem;">⚖️ Оцінювання</h1>
            <div id="submissions-to-evaluate" class="grid"></div>
        </div>
    </main>

    <!-- Оверлей модалок -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModals()"></div>

    <!-- Модалка: Вхід -->
    <div id="modal-login" class="modal hidden">
        <h3>🔐 Вхід</h3>
        <form onsubmit="submitLogin(event)">
            <input type="email" id="login-email" placeholder="Email" required autocomplete="email">
            <input type="password" id="login-password" placeholder="Пароль" required autocomplete="current-password">
            <div id="login-error" class="modal-error" style="display:none;"></div>
            <div style="display:flex; gap:0.5rem; margin-top:0.25rem;">
                <button type="submit" class="btn" style="flex:1;">Увійти</button>
                <button type="button" class="btn btn-secondary" onclick="closeModals()">Скасувати</button>
            </div>
        </form>
    </div>

    <!-- Модалка: Реєстрація (нова команда) -->
    <div id="modal-register" class="modal hidden">
        <h3>👤 Реєстрація</h3>
        <p style="color:var(--text-muted); font-size:0.88rem; margin-bottom:1rem;">Після реєстрації ви зможете приєднатись до турніру як команда.</p>
        <form onsubmit="submitRegister(event)">
            <input type="text" id="reg-user-name" placeholder="Ваше ім'я (ПІБ капітана)" required autocomplete="name">
            <input type="email" id="reg-user-email" placeholder="Email" required autocomplete="email">
            <input type="password" id="reg-user-password" placeholder="Пароль (мін. 6 символів)" required autocomplete="new-password" minlength="6">
            <div id="register-error" class="modal-error" style="display:none;"></div>
            <div style="display:flex; gap:0.5rem; margin-top:0.25rem;">
                <button type="submit" class="btn" style="flex:1;">Зареєструватися</button>
                <button type="button" class="btn btn-secondary" onclick="closeModals()">Скасувати</button>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
